{% extends "base.html" %}

{% block title %}
    Перенос проекта: {{ project.title }}
{% endblock %}

{% block content %}
    <p>
        <a href="{{ url_for('projects.project_detail', project_id=project.id) }}">
            ← К карточке проекта
        </a>
    </p>

    <h1>Перенос проекта: {{ project.title }}</h1>

    <form method="post">
        {{ form.hidden_tag() }}

        <p>
            {{ form.new_parent_id.label }}<br>
            {{ form.new_parent_id() }}
        </p>

        <p>{{ form.submit() }}</p>
    </form>
{% endblock %}
