<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            color: #222;
        }

        h1 {
            margin-bottom: 8px;
        }

        p {
            color: #555;
        }

        form {
            margin: 0;
        }

        .add-form {
            display: flex;
            gap: 8px;
            margin: 24px 0 16px;
        }

        .add-form input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-link {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 999px;
            text-decoration: none;
            border: 1px solid #ccc;
            color: #333;
            background: #fff;
            font-size: 14px;
        }

        .filter-link:hover {
            background: #f3f4f6;
        }

        .filter-link.active {
            background: #2563eb;
            border-color: #2563eb;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
        }

        .task-title {
            flex: 1;
        }

        .task-title.done {
            text-decoration: line-through;
            color: #777;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-add {
            background-color: #2563eb;
        }

        .btn-add:hover {
            background-color: #1d4ed8;
        }

        .btn-done {
            background-color: #16a34a;
        }

        .btn-done:hover {
            background-color: #15803d;
        }

        .btn-edit {
            background-color: #d97706;
        }

        .btn-edit:hover {
            background-color: #b45309;
        }

        .btn-delete {
            background-color: #dc2626;
        }

        .btn-delete:hover {
            background-color: #b91c1c;
        }

        .empty-state {
            color: #777;
            font-style: italic;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <h1>Planner</h1>
    <p>First browser version of your planner.</p>

    <form method="post" class="add-form">
        <input
            type="text"
            name="title"
            placeholder="Enter a new task"
            required
        >
        <button type="submit" class="btn btn-add">Add task</button>
    </form>

    <div class="filters">
        <a
            href="{{ url_for('index', filter='all') }}"
            class="filter-link {% if current_filter == 'all' %}active{% endif %}"
        >
            All
        </a>
        <a
            href="{{ url_for('index', filter='active') }}"
            class="filter-link {% if current_filter == 'active' %}active{% endif %}"
        >
            Active
        </a>
        <a
            href="{{ url_for('index', filter='done') }}"
            class="filter-link {% if current_filter == 'done' %}active{% endif %}"
        >
            Done
        </a>
    </div>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    <span class="task-title {% if task.done %}done{% endif %}">
                        {{ task.title }}
                    </span>

                    <div class="task-actions">
                        {% if not task.done %}
                            <form action="{{ url_for('mark_done', task_id=task.id, filter=current_filter) }}" method="post">
                                <button type="submit" class="btn btn-done">Done</button>
                            </form>
                        {% endif %}

                        <a
                            href="{{ url_for('edit_task', task_id=task.id, filter=current_filter) }}"
                            class="btn btn-edit"
                        >
                            Edit
                        </a>

                        <form action="{{ url_for('delete_task', task_id=task.id, filter=current_filter) }}" method="post">
                            <button
                                type="submit"
                                class="btn btn-delete"
                                onclick="return confirm('Delete this task?')"
                            >
                                Delete
                            </button>
                        </form>
                    </div>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="empty-state">No tasks in this filter.</p>
    {% endif %}
</body>
</html>
