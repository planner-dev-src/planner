<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f7f7f7;
            color: #222;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }
        h1 {
            margin-top: 0;
        }
        ul {
            padding-left: 0;
            list-style: none;
        }
        li {
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #fafafa;
        }
        .done {
            color: #666;
            text-decoration: line-through;
        }
        .meta {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Planner</h1>
        <p>First browser version of your planner.</p>

        <ul>
            {% for task in tasks %}
            <li>
                <div class="{{ 'done' if task.done else '' }}">
                    {% if task.done %}✔{% else %}○{% endif %} {{ task.title }}
                </div>
                <div class="meta">id={{ task.id }}</div>
            </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
