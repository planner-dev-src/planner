<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            color: #222;
        }

        h1 {
            margin-bottom: 8px;
        }

        p {
            color: #555;
        }

        form {
            margin: 0;
        }

        .add-form {
            display: flex;
            gap: 8px;
            margin: 24px 0;
        }

        .add-form input[type="text"] {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
        }

        .task-title {
            flex: 1;
        }

        .task-title.done {
            text-decoration: line-through;
            color: #777;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            border: none;
            border-radius: 6px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-add {
            background-color: #2563eb;
        }

        .btn-add:hover {
            background-color: #1d4ed8;
        }

        .btn-done {
            background-color: #16a34a;
        }

        .btn-done:hover {
            background-color: #15803d;
        }

        .btn-delete {
            background-color: #dc2626;
        }

        .btn-delete:hover {
            background-color: #b91c1c;
        }

        .empty-state {
            color: #777;
            font-style: italic;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <h1>Planner</h1>
    <p>First browser version of your planner.</p>

    <form method="post" class="add-form">
        <input
            type="text"
            name="title"
            placeholder="Enter a new task"
            required
        >
        <button type="submit" class="btn btn-add">Add task</button>
    </form>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    <span class="task-title {% if task.done %}done{% endif %}">
                        {{ task.title }}
                    </span>

                    <div class="task-actions">
                        {% if not task.done %}
                            <form action="{{ url_for('mark_done', task_id=task.id) }}" method="post">
                                <button type="submit" class="btn btn-done">Done</button>
                            </form>
                        {% endif %}

                        <form action="{{ url_for('delete_task', task_id=task.id) }}" method="post">
                            <button
                                type="submit"
                                class="btn btn-delete"
                                onclick="return confirm('Delete this task?')"
                            >
                                Delete
                            </button>
                        </form>
                    </div>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="empty-state">No tasks yet.</p>
    {% endif %}
</body>
</html>
