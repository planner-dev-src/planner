<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Rename column</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
            color: #222;
        }

        h1 {
            margin-bottom: 20px;
        }

        .edit-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .edit-form input[type="text"] {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            display: inline-block;
            border: none;
            border-radius: 6px;
            padding: 10px 14px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        .btn-save {
            background-color: #2563eb;
        }

        .btn-save:hover {
            background-color: #1d4ed8;
        }

        .btn-cancel {
            background-color: #6b7280;
        }

        .btn-cancel:hover {
            background-color: #4b5563;
        }
    </style>
</head>
<body>
    <h1>Rename column</h1>

    <form method="post" class="edit-form">
        <input
            type="text"
            name="name"
            value="{{ column.name }}"
            required
        >

        <div class="actions">
            <button type="submit" class="btn btn-save">Save</button>
            <a href="{{ url_for('index') }}" class="btn btn-cancel">Cancel</a>
        </div>
    </form>
</body>
</html>
